<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Polymarket LTF Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <main class="app-frame">
        <section class="hero-grid">
          <article class="hero-card hero-card-account">
            <div class="hero-top">
              <div>
                <p class="hero-label">账户总览</p>
                <h1 class="hero-value" id="portfolio-value">--</h1>
                <p class="hero-subvalue" id="portfolio-secondary">等待首个快照</p>
              </div>
              <div class="hero-side">
                <span class="connection-chip" id="connection-status">连接中</span>
              </div>
            </div>

            <div class="status-strip" id="status-strip"></div>
            <div class="hero-actions" id="hero-actions"></div>
            <p class="hero-error" id="account-error">当前无错误</p>
          </article>

          <article class="hero-card hero-card-strategy">
            <div class="section-title-row">
              <div>
                <p class="section-eyebrow">策略</p>
              </div>
              <div class="strategy-topbar">
                <span class="section-count" id="strategy-count">0 个策略</span>
              </div>
            </div>
            <div class="strategy-switcher" id="strategy-switcher"></div>
          </article>
        </section>

        <section class="table-card">
          <div class="tabs-row">
            <div class="tabs" id="table-tabs"></div>
            <label class="search-box">
              <span class="search-icon">⌕</span>
              <input id="search-input" type="search" placeholder="搜索市场或结果" autocomplete="off" />
            </label>
          </div>

          <div class="table-wrap">
            <div class="table-head" id="table-head"></div>
            <div class="table-body" id="table-body"></div>
          </div>

          <div class="table-footer">
            <span class="table-summary" id="table-summary">等待数据</span>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
